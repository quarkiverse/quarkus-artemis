name: Build

on:
  workflow_dispatch:
  push:
    branches:
      - "main"
      - "3.13.x"
      - "3.9.x"
      - "3.7.x"
    paths-ignore:
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
      - '*.md'
      - '*.adoc'
      - '*.txt'
      - '.all-contributorsrc'
  pull_request:
    paths-ignore:
      - '.gitignore'
      - 'CODEOWNERS'
      - 'LICENSE'
      - '*.md'
      - '*.adoc'
      - '*.txt'
      - '.all-contributorsrc'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  generate-matrix:
    runs-on: ubuntu-latest

    outputs:
      matrix: ${{ steps.generate-matrix.outputs.matrix }}

    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Generate Matrix
        id: generate-matrix
        run: |
          root=$(pwd)/integration-tests
          pom_file=pom.xml
          exclude_dir_pattern=common
          exclude_package_type=pom

          mapfile -t candidates < <(
          find "${root}" -type f -name "${pom_file}" \
            | sed "s|/${pom_file}$||" \
            | sort \
            | uniq)

          results=()
          for candidate in "${candidates[@]}"
          do
            if [[ "${candidate}" = "${root}" || "${candidate}" =~ ${exclude_dir_pattern} ]]
            then
              continue
            fi

            pom_packaging=0
            grep --quiet \
              "<packaging>${exclude_package_type}</packaging>" \
              "${candidate}/${pom_file}" \
                || pom_packaging="${?}"
            if [[ "${pom_packaging}" -ne 0 ]]
            then
              results+=("${candidate}")
            fi
          done
          matrix=$( \
            echo "${results[@]}" \
              | tr " " "\n" \
              | sed "s|$(pwd)/||" \
              | jq \
                --raw-input \
                --null-input \
                --compact-output \
                "[ [inputs][] | { \"integration-test-module\": . } ] | { \"include\": . }")
          echo "matrix=${matrix}" >> "${GITHUB_OUTPUT}"

  populate-cache:
    runs-on: ubuntu-latest

    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'
        id: setup

      - name: Populate Maven Cache
        id: populate
        if: ${{ steps.setup.outputs.cache-hit != 'true' }}
        run: |
          ./mvnw \
            --batch-mode \
            --define maven.buildNumber.skip \
            de.qaware.maven:go-offline-maven-plugin:resolve-dependencies
          ./mvnw \
            --batch-mode \
            --define maven.buildNumber.skip \
            --projects integration-tests \
            quarkus:go-offline

  build-and-test-jvm:
    runs-on: ubuntu-latest

    continue-on-error: true

    needs:
      - generate-matrix
      - populate-cache

    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        id: build-and-test-jvm
        run: |
          artifact_path=${{ matrix.integration-test-module }}
          ./mvnw \
            --batch-mode \
            --also-make \
            --define no-format \
            --define maven.buildNumber.skip \
            --projects \
              "core/deployment, \
              jms/deployment, \
              ra/deployment, \
              ${artifact_path}" \
            verify
          echo "artifact_suffix=${artifact_path//\//_}" >> "${GITHUB_OUTPUT}"

      - name: Upload JVM Test Report
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: test-report-jvm-${{ steps.build-and-test-jvm.outputs.artifact_suffix }}
          path: '**/target/*-reports/TEST*.xml'
          if-no-files-found: error
          retention-days: 2

  build-and-test-native:
    runs-on: ubuntu-latest

    needs:
      - populate-cache
      - generate-matrix

    continue-on-error: true

    strategy:
      matrix: ${{ fromJson(needs.generate-matrix.outputs.matrix) }}

    steps:
      - name: Git checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: 21
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Test
        id: build-and-test-native
        run: |
          artifact_path=${{ matrix.integration-test-module }}
          ./mvnw \
            --batch-mode  \
            --also-make \
            --define maven.buildNumber.skip \
            --define native \
            --define native.surefire.skip \
            --define quarkus.native.container-build \
            --define quarkus.native.builder-image=quay.io/quarkus/ubi-quarkus-mandrel-builder-image:jdk-21 \
            --projects \
              "core/deployment, \
              jms/deployment, \
              ra/deployment, \
              ${artifact_path}" \
            verify
          echo "artifact_suffix=${artifact_path//\//_}" >> "${GITHUB_OUTPUT}"

      - name: Upload Native Test Report
        uses: actions/upload-artifact@v7
        if: ${{ always() }}
        with:
          name: test-report-native-${{ steps.build-and-test-native.outputs.artifact_suffix }}
          path: '**/target/*-reports/TEST*.xml'
          if-no-files-found: error
          retention-days: 2
